<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анимированный плакат</title>
    <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <div class="poster">
      <header class="poster__header">
        <h1 class="poster__title">
          <span class="title__two-lines"
            >ЛАБОРАТОРИЯ&nbsp;БИВИУМ<br />КАЛЕЙДОСКОП&nbsp;ЗНАНИЙ</span
          >
          <span class="title__four-lines"
            >ЛАБОРАТОРИЯ<br />БИВИУМ<br />КАЛЕЙДОСКОП<br />ЗНАНИЙ</span
          >
        </h1>
      </header>

      <main class="poster__main">
        <!-- Первый модуль: калейдоскоп -->
        <h2 class="poster__subtitle">
          ТАИНСТВЕННЫЕ УЗОРЫ<br />УГАДАЙ ЖИВОТНОЕ
        </h2>

        <div class="main__kaleidoscope-wrapper">
          <img
            src="img/kaleidoscope-1.webp"
            alt="Калейдоскоп"
            class="main__kaleidoscope"
          />
        </div>

        <div class="main__decor">
          <div class="decor__circle" aria-hidden="true"></div>
          <img
            src="img/image-1.webp"
            alt="Животное"
            class="decor__animal"
            aria-hidden="true"
          />
          <div class="decor__lines">
            <img
              src="img/SubtractL.svg"
              alt="Предыдущее"
              class="decor__line decor__line--left"
            />
            <img
              src="img/SubtractR.svg"
              alt="Следующее"
              class="decor__line decor__line--right"
            />
          </div>
        </div>

        <div class="main__actions">
          <div class="main__buttons">
            <button class="button button--rotate">КРУТИТЬ</button>
          </div>
          <div class="main__buttons main__buttons--answer">
            <button class="button button--answer">ОТВЕТИТЬ</button>
          </div>
        </div>

        <!-- Второй модуль: раскраска -->
        <h2 class="poster__subtitle-two-lines">
          Волшебная&nbsp;память<br />раскрась&nbsp;узор
        </h2>

        <div class="pattern-area"></div>
        <div class="pattern-management">
          <div class="pattern-hint">подсказка</div>
          <div class="palette">
            <div class="ellipse" data-color="#BB8DB0">
              <img class="vector" src="img/brush.svg" />
            </div>
            <div class="ellipse" data-color="#FF751F">
              <img class="vector" src="img/brush.svg" />
            </div>
            <div class="ellipse" data-color="#FF00AE">
              <img class="vector" src="img/brush.svg" />
            </div>
            <div class="ellipse" data-color="#A1C8E4">
              <img class="vector" src="img/brush.svg" />
            </div>
            <div class="ellipse" data-color="#FCBE6C">
              <img class="vector" src="img/brush.svg" />
            </div>
            <div class="ellipse" data-color="#FFFFFF">
              <img class="vector" src="img/brush.svg" />
            </div>
          </div>
        </div>

        <div class="main__actions-2">
          <div class="main__buttons">
            <button class="button button--play">ИГРАТЬ</button>
          </div>
          <div class="main__buttons main__buttons--check">
            <button class="button button--check">СВЕРИТЬ</button>
          </div>
        </div>

        <!-- Третий модуль: колесо -->
        <h2 class="poster__subtitle-three-lines">
          Загадочные животные<br />послушай&nbsp;голос
        </h2>
        <div class="wheel-area">
          <div class="wheel-pointer">
            <svg
              width="284"
              height="285"
              viewBox="0 0 284 285"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M0.700486 36.997C88.498 -13.1362 196.269 -11.5006 282.619 41.2705L142.892 283.28L0.700486 36.997Z"
                fill="#F912A9"
                stroke="#7E7E7E"
                stroke-width="1.02318"
              />
            </svg>
          </div>
          <img src="img/sections.webp" alt="Колесо" class="" />
        </div>
        <div class="main__actions-3">
          <div class="main__buttons">
            <button class="button button--wheel-spin">КРУТИТЬ</button>
          </div>
          <div class="main__buttons main__buttons--listen">
            <button class="button button--wheel-listen">СЛУШАТЬ</button>
          </div>
        </div>
      </main>

      <footer class="poster__footer">
        <img src="img/logo.svg" alt="Логотип" class="footer__logo" />
        <div class="footer__info">
          <div class="footer__name">ЕНДОВИЦКАЯ АЛЕНА</div>
          <div class="footer__group">БП25Д312</div>
        </div>
      </footer>
    </div>

    <script src="./scripts/script.js"></script>
  </body>
</html>
